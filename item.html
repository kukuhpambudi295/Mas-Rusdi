        <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN DULU JAL</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {

background-image:

url('rusdi.jpeg');

background-size: cover;

background-position: center;

background-repeat: no-repeat;

height: 1600px;

width: 900px;

display: flex;

align-items: center;

justify-content: center;
}

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Gelapkan background sedikit */
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2; /* Agar berada di atas overlay */
            background: rgba(255, 255, 255, 0.15); /* Transparan putih */
            backdrop-filter: blur(10px); /* Efek blur kaca di belakang form */
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #f1f5f9;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #1e293b; /* Warna gelap agar kontras */
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn-login:hover {
            background-color: #0f172a;
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #e2e8f0;
        }

        .footer-links a {
            color: #38bdf8; 
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Masuk Akun</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username atau Email</label>
                <input type="text" id="username" placeholder="Masukkan username Anda" required>
            </div>

            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan kata sandi Anda" required>
            </div>

            <button type="submit" class="btn-login">Login Clek</button>
        </form>

        <div class="footer-links">
            <p>Belum punya akun? <a href="#">Daftar disini</a></p>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // Validasi sederhana
      if(username === "jojo.item" && password === "dedi") {
        // Pindah ke halaman hideung.html
        window.location.href = "hideung.html";
      } else {
        alert("Username atau password salah.");
      }
    });
    </script>

</body>
</html>
